      "assets/img/profile/bg-3.jpg",
      "assets/img/profile/bg-1.jpeg",
      "assets/img/profile/bg-2.jpg",
    ]
  photo: "assets/img/profile/avatar_hieubq.jpg"
  name: "Bui Quang Hieu"
  typed:
    - text: "Back-end Developer"
  social:
